<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>百度网盘 · 极简搜索</title>
    <style>
        /* ---------- 全局样式 纯粹搜索体验 ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #f9fafc 0%, #edf1f7 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .search-container {
            max-width: 720px;
            width: 100%;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 56px;
            box-shadow: 0 20px 40px -12px rgba(0,0,0,0.15), 0 4px 18px rgba(0,0,0,0.05);
            padding: 2rem 2rem 2.2rem;
            border: 1px solid rgba(255,255,255,0.4);
            transition: all 0.2s ease;
        }

        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo h1 {
            font-size: 2.4rem;
            font-weight: 600;
            letter-spacing: -0.5px;
            background: linear-gradient(145deg, #1e2b4f, #1f3a5f);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .logo span {
            font-size: 1.8rem;
        }

        .sub {
            color: #3e5a76;
            font-size: 0.95rem;
            border-bottom: 1px dashed #a0c1d9;
            padding-bottom: 0.6rem;
            margin-top: 0.2rem;
        }

        .search-form {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.2rem;
        }

        .search-box {
            display: flex;
            width: 100%;
            background: white;
            border-radius: 60px;
            box-shadow: 0 2px 10px rgba(0,20,40,0.08);
            transition: box-shadow 0.2s, border-color 0.2s;
            border: 1px solid #e3eaf0;
        }

        .search-box:focus-within {
            box-shadow: 0 4px 20px rgba(30,80,120,0.12);
            border-color: #8ab3cf;
        }

        #searchInput {
            flex: 1;
            padding: 1rem 1.8rem;
            font-size: 1.2rem;
            border: none;
            background: transparent;
            border-radius: 60px 0 0 60px;
            outline: none;
            color: #1d2f3f;
            font-weight: 450;
        }

        #searchInput::placeholder {
            color: #9eb3c2;
            font-weight: 350;
            letter-spacing: 0.3px;
        }

        #searchBtn {
            background: #1f4172;
            border: none;
            color: white;
            font-weight: 550;
            padding: 0 2rem;
            border-radius: 0 60px 60px 0;
            font-size: 1.1rem;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            display: flex;
            align-items: center;
            gap: 6px;
            letter-spacing: 1.5px;
            border-left: 1px solid rgba(255,255,255,0.2);
        }

        #searchBtn:hover {
            background: #163458;
        }

        #searchBtn:active {
            transform: scale(0.97);
        }

        .stats {
            margin-top: 1.4rem;
            color: #3f5b6b;
            font-size: 0.9rem;
            text-align: center;
            background: rgba(255,255,255,0.5);
            padding: 0.4rem 1rem;
            border-radius: 40px;
            display: inline-block;
            align-self: center;
        }

        .footer-note {
            margin-top: 2.2rem;
            font-size: 0.78rem;
            color: #6d8a9c;
            text-align: center;
            border-top: 1px solid rgba(150,180,200,0.3);
            padding-top: 1.2rem;
        }

        .footer-note a {
            color: #1f4b6e;
            text-decoration: none;
            border-bottom: 1px dotted #779bb0;
        }

        /* 提示消息 */
        .tip-message {
            background: #eaf4fc;
            border-radius: 32px;
            padding: 0.5rem 1.2rem;
            font-size: 0.9rem;
            color: #145b8c;
        }
    </style>
</head>
<body>
    <div class="search-container">
        <div class="logo">
            <h1>
                <span>🔍</span> 网盘直搜
            </h1>
            <div class="sub">—— 一键直达 · 百度网盘视频资源</div>
        </div>

        <!-- 纯粹搜索栏，无任何管理干扰 -->
        <div class="search-form">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="输入视频名称 / 关键词..." autofocus aria-label="搜索资源">
                <button id="searchBtn">搜索</button>
            </div>
            <div id="statsArea" class="stats">📁 正在加载资源数量…</div>
        </div>

        <div class="footer-note">
            ⚡ 匹配成功即在新标签页打开百度网盘链接。<br>
            资源由管理员在后台维护。
        </div>
    </div>

    <script>
        (function() {
            "use strict";

            // ================  同一套localStorage管理，与后台admin完全互通 ================
            const STORAGE_KEY = 'baiduPanResources';

            // ---------- 工具函数：获取资源数组 ----------
            function getResources() {
                const stored = localStorage.getItem(STORAGE_KEY);
                if (stored) {
                    try {
                        return JSON.parse(stored) || [];
                    } catch (e) {
                        return [];
                    }
                }
                return []; // 初始为空，由后台添加。主页不生成示例数据，保证后台独立管理
            }

            // ---------- 更新资源统计显示 ----------
            function updateStats() {
                const resources = getResources();
                const statsEl = document.getElementById('statsArea');
                if (resources.length === 0) {
                    statsEl.innerHTML = '📭 当前暂无视频资源，请联系管理员添加';
                } else {
                    statsEl.innerHTML = `🎬 可检索视频资源 · 共 ${resources.length} 个`;
                }
            }

            // ---------- 搜索跳转核心：新标签打开匹配的第一个百度网盘链接 ----------
            function performSearch() {
                const input = document.getElementById('searchInput');
                const keyword = input.value.trim();
                if (keyword === '') {
                    alert('请输入要搜索的视频名称或关键词');
                    return;
                }

                const resources = getResources();
                if (resources.length === 0) {
                    alert('当前资源库为空，无法跳转。请在后台添加视频链接。');
                    return;
                }

                // 不区分大小写模糊匹配 —— 标题包含关键词即视为命中，取第一个
                const lowerKeyword = keyword.toLowerCase();
                const matched = resources.find(item => 
                    item.title && item.title.toLowerCase().includes(lowerKeyword)
                );

                if (matched) {
                    // 新标签页打开百度网盘链接，保留搜索页面
                    window.open(matched.link, '_blank', 'noopener,noreferrer');
                    // 可选：轻提示（非阻塞）
                    input.value = '';  // 清空搜索框，方便下次输入
                    input.focus();
                } else {
                    alert(`未找到与“${keyword}”相关的视频资源，请尝试其他关键词`);
                }
            }

            // ---------- 初始化: 绑定事件，更新状态 ----------
            function initSearch() {
                updateStats();

                const searchBtn = document.getElementById('searchBtn');
                const searchInput = document.getElementById('searchInput');

                // 按钮点击搜索
                searchBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    performSearch();
                });

                // 回车搜索
                searchInput.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        performSearch();
                    }
                });

                // 监听storage变动（当后台更新数据时，实时刷新统计）
                window.addEventListener('storage', function(e) {
                    if (e.key === STORAGE_KEY) {
                        updateStats();
                    }
                });
            }

            // 页面加载启动
            window.addEventListener('DOMContentLoaded', initSearch);
        })();
    </script>
</body>
</html>
