        }

        #searchInput {
            flex: 1;

            padding: 0.9rem 1.5rem;
            border: 1.5px solid #e2e8f0;
            border-radius: 48px;
            font-size: 1.05rem;

        }

        #searchInput:focus {
            border-color: #3b82f6;
            outline: none;

        }

        #searchBtn {
            background: #0f172a;

            border-radius: 48px;
            padding: 0 2rem;
            font-size: 1.05rem;
            font-weight: 500;

        (function() {
            "use strict";

            // ---------- 频率限制配置 ----------
            const RATE_LIMIT_KEY = 'search_timestamps';  // localStorage 存储键
            const RATE_LIMIT_WINDOW = 2 * 60 * 1000;      // 2分钟 = 120000 ms
            const RATE_LIMIT_MAX = 2;                      // 最多2次

            // 检查是否超过频率限制，如果未超过则记录本次搜索并返回 true，否则返回 false
            function checkAndRecordSearch() {
                const now = Date.now();
                let timestamps = [];

                // 从 localStorage 读取已有时间戳
                const stored = localStorage.getItem(RATE_LIMIT_KEY);
                if (stored) {
                    try {
                        timestamps = JSON.parse(stored);
                        // 确保是数组
                        if (!Array.isArray(timestamps)) timestamps = [];
                    } catch (e) {
                        timestamps = [];
                    }
                }

                // 过滤掉超出时间窗口的记录（保留在窗口内的）
                timestamps = timestamps.filter(ts => now - ts < RATE_LIMIT_WINDOW);

                // 判断是否已达上限
                if (timestamps.length >= RATE_LIMIT_MAX) {
                    // 达到限制，提示并返回 false
                    const oldestAllowed = now - RATE_LIMIT_WINDOW;
                    const firstTs = timestamps[0]; // 窗口内最早的记录
                    const waitMs = (firstTs + RATE_LIMIT_WINDOW) - now;
                    const waitSeconds = Math.ceil(waitMs / 1000);
                    alert(`⏳ 搜索过于频繁，请稍后再试。每2分钟仅限搜索${RATE_LIMIT_MAX}次，还需等待 ${waitSeconds} 秒。`);
                    return false;
                }

                // 未达限制：记录本次搜索时间戳，更新存储
                timestamps.push(now);
                localStorage.setItem(RATE_LIMIT_KEY, JSON.stringify(timestamps));
                return true;
            }

            const searchInput = document.getElementById('searchInput');
            const searchBtn = document.getElementById('searchBtn');
            const resultsContainer = document.getElementById('results');
            const resultStats = document.getElementById('resultStats');
            const resultCountTag = document.getElementById('resultCountTag');

            function escapeHTML(str) {
                if (!str) return '';
                return String(str).replace(/[&<>"]/g, function(c) {
                    if (c === '&') return '&amp;';
                    if (c === '<') return '&lt;';
                    if (c === '>') return '&gt;';
                    if (c === '"') return '&quot;';
                    return c;
                });
            }

            // 随机取最多10项
            function getRandomTen(arr) {
                const copy = [...arr];
                for (let i = copy.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [copy[i], copy[j]] = [copy[j], copy[i]];
                }
                return copy.slice(0, 10);
            }

            function renderResults(resourceArray) {
                resultsContainer.innerHTML = '';

                const count = resourceArray.length;
                resultCountTag.innerText = `${count} 个资源`;
                resultStats.innerHTML = count ? `📋 找到 ${count} 个影视资源` : '📭 没有匹配的资源';

                if (count === 0) {
                    const emptyDiv = document.createElement('div');
                    emptyDiv.className = 'placeholder-message';
                    emptyDiv.innerHTML = '😕 没有找到相关影视或主演<br><span style="font-size:0.9rem;">试试其他关键词～</span>';
                    resultsContainer.appendChild(emptyDiv);
                    return;
                }

                resourceArray.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'resource-card';

                    const infoDiv = document.createElement('div');
                    infoDiv.className = 'info-section';

                    const nameLine = document.createElement('div');
                    nameLine.className = 'resource-name';
                    nameLine.innerHTML = `
                        ${escapeHTML(item.name)}
                        <span class="resource-tag">${escapeHTML(item.type)}</span>
                        <span class="baidu-badge">📁 百度网盘</span>
                    `;

                    const actorDiv = document.createElement('div');
                    actorDiv.className = 'actor-info';
                    actorDiv.innerHTML = `
                        <span class="actor-label">🎭 主演</span>
                        <span class="actor-names">${escapeHTML(item.actors || '信息待补充')}</span>
                    `;

                    const linkHint = document.createElement('div');
                    linkHint.style.fontSize = '0.8rem';
                    linkHint.style.color = '#64748b';
                    linkHint.style.marginTop = '6px';
                    let shortUrl = item.url || '';
                    if (shortUrl.length > 40) shortUrl = shortUrl.substring(0, 38) + '…';
                    linkHint.innerHTML = `<span style="background:#f1f5f9; padding:2px 10px; border-radius:20px;">🔗 ${escapeHTML(shortUrl)}</span>`;

                    infoDiv.appendChild(nameLine);
                    infoDiv.appendChild(actorDiv);
                    infoDiv.appendChild(linkHint);

                    const confirmBtn = document.createElement('button');
                    confirmBtn.className = 'confirm-btn';
                    confirmBtn.setAttribute('data-url', item.url);
                    confirmBtn.setAttribute('data-name', item.name);
                    confirmBtn.innerHTML = `✔️ 确认跳转网盘`;

                    card.appendChild(infoDiv);
                    card.appendChild(confirmBtn);
                    resultsContainer.appendChild(card);
                });
            }

            // 核心搜索函数：先检查频率限制，通过才执行搜索
            function performSearch() {
                // 频率限制检查
                if (!checkAndRecordSearch()) {
                    return; // 超限，阻止搜索
                }

                const keyword = searchInput.value.trim();
                let resultSet = [];

                if (keyword === '') {
                    resultSet = getRandomTen(resources);
                } else {
                    const lowerKeyword = keyword.toLowerCase();
                    resultSet = resources.filter(item => 
                        item.name.toLowerCase().includes(lowerKeyword) ||
                        item.type.toLowerCase().includes(lowerKeyword) ||
                        (item.actors && item.actors.toLowerCase().includes(lowerKeyword))
                    );
                }

                renderResults(resultSet);
            }

            // 事件绑定
            searchBtn.addEventListener('click', function(e) {
                e.preventDefault();
                performSearch();
            });

            searchInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    performSearch();
                }
            });

            // 确认跳转：二次确认
            resultsContainer.addEventListener('click', function(e) {
                const btn = e.target.closest('.confirm-btn');
                if (!btn) return;
                const url = btn.dataset.url;
                const resourceName = btn.dataset.name || '该资源';

                const isConfirm = confirm(`📌 即将跳转百度网盘\n\n《${resourceName}》\n\n确认打开链接吗？`);
                if (isConfirm) {
                    window.open(url, '_blank');
                }
            });

            // 初始占位
            function setInitialPlaceholder() {
                resultsContainer.innerHTML = '<div class="placeholder-message">🎲 点击“搜索”按钮随机展示10部影视<br><span style="font-size:0.9rem;">也可输入片名或主演精准查找 · 每2分钟限2次</span></div>';
                resultCountTag.innerText = '0 个资源';
                resultStats.innerHTML = '✨ 等待搜索';
            }
            setInitialPlaceholder();
            searchInput.value = '';
        })();
    </script>
